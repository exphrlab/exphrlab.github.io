</style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Merriweather', 'Georgia', 'Cambria', 'serif'],
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* ── Navbar ── */
    :root {
      --navy:      #2d6a4f;
      --navy-deep: #ffffff;
      --gold:      #2d6a4f;
      --gold-light:#52b788;
      --white:     #ffffff;
      --off-white: #f8f9fa;
      --text:      #2d2d2d;
      --muted:     #4b5563;
      --border:    #e5e7eb;
      --serif:     'Merriweather', Georgia, 'Times New Roman', serif;
      --sans:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy-deep);
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
      overflow: visible;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      overflow: visible;
      position: relative;
    }

    /* ── Brand (always far-left) ── */
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-brand img {
      height: 36px;
      width: auto;
      mix-blend-mode: multiply;
      filter: none;
    }
    .nav-brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .nav-brand-name {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .nav-brand-sub {
      font-size: 0.65rem;
      color: #6b7280;
      letter-spacing: 0.01em;
      display: none;
    }
    @media (min-width: 900px) { .nav-brand-sub { display: block; } }

    /* ── Hamburger toggle (mobile only) ── */
    .nav-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      color: #374151;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      padding: 0;
    }
    .nav-toggle:hover { background: rgba(45,106,79,0.08); color: var(--navy); }
    .nav-toggle svg { display: block; }

    /* ── Nav links (always far-right on desktop) ── */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.1rem;
      overflow-x: clip;
      overflow-y: visible;
      scrollbar-width: none;
      -ms-overflow-style: none;
      flex-shrink: 0;
      position: relative;
    }
    .nav-links::-webkit-scrollbar { display: none; }

    .nav-links a,
    .nav-drop-trigger {
      color: #374151;
      font-size: 0.77rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.38rem 0.6rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
      cursor: pointer;
    }
    .nav-links a:hover,
    .nav-drop-trigger:hover {
      color: var(--navy);
      background: rgba(45,106,79,0.08);
    }

    /* ── Contact dropdown ── */
    .nav-drop { position: relative; overflow: visible; }
    .nav-drop-trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: none;
      border: none;
      font-family: var(--sans);
      cursor: pointer;
    }
    .nav-drop-trigger svg {
      width: 10px;
      height: 10px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    #contact-dropdown-wrapper:hover .nav-drop-trigger svg,
    #contact-dropdown-wrapper.show-dropdown .nav-drop-trigger svg { transform: rotate(180deg); }

    #contact-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 13rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-radius: 5px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.16);
      z-index: 9999;
      overflow: hidden;
    }
    #contact-dropdown a {
      display: block;
      padding: 0.65rem 1rem;
      font-size: 0.83rem;
      color: var(--text);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s, color 0.12s;
      text-transform: none;
      letter-spacing: 0;
    }
    #contact-dropdown a:last-child { border-bottom: none; }
    #contact-dropdown a:hover { background: var(--off-white); color: var(--navy); }

    #contact-dropdown-wrapper:not(:hover):not(.show-dropdown) #contact-dropdown:not(:hover) {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.15s, visibility 0.15s, transform 0.15s;
    }
    #contact-dropdown-wrapper:hover #contact-dropdown,
    #contact-dropdown-wrapper.show-dropdown #contact-dropdown,
    #contact-dropdown:hover {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
      transition: opacity 0.15s, visibility 0.15s, transform 0.15s;
    }
    #contact-dropdown-wrapper:has(:hover) #contact-dropdown {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* ── Mobile responsive ── */
    @media (max-width: 767px) {
      .nav-toggle { display: flex; }

      .nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--white);
        border-top: 1px solid var(--border);
        border-bottom: 2px solid var(--gold);
        box-shadow: 0 6px 18px rgba(0,0,0,0.09);
        padding: 0.4rem 0;
        gap: 0;
        overflow-x: visible;
        overflow-y: auto;
        z-index: 98;
      }
      .nav-links.nav-open { display: flex; }

      .nav-links a,
      .nav-drop-trigger {
        padding: 0.75rem 1.25rem;
        border-radius: 0;
        font-size: 0.82rem;
        justify-content: flex-start;
        width: 100%;
        border-bottom: 1px solid rgba(0,0,0,0.04);
      }
      .nav-links a:last-child { border-bottom: none; }

      /* Contact dropdown becomes inline on mobile */
      .nav-drop { overflow: visible; }
      #contact-dropdown {
        position: static;
        box-shadow: none;
        border: none;
        border-top: none;
        border-radius: 0;
        background: #f3f8f5;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        transform: none !important;
        transition: none !important;
        display: none;
      }
      #contact-dropdown-wrapper.show-dropdown #contact-dropdown,
      #contact-dropdown-wrapper.mob-open #contact-dropdown { display: block; }
      #contact-dropdown a {
        padding: 0.65rem 2rem;
        font-size: 0.8rem;
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }
      #contact-dropdown a:last-child { border-bottom: none; }
      .nav-drop-trigger svg { margin-left: auto; }
    }
  </style>
</head>

          document.addEventListener('click', (e) => {

          });
        }
        
        // Mobile: Toggle on tap
        if (isMobile) {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const isExpanded = link.getAttribute('aria-expanded') === 'true';
            if (isExpanded) {
              hideDropdown();
            } else {

            }
          });
          
          // Close on outside tap

      const menu = document.getElementById('mobile-menu');

      const closeIcon = document.getElementById('close-icon');
      const isHidden = menu.classList.contains('hidden');
      
      if (isHidden) {
        
        menuIcon?.classList.add('hidden');
        closeIcon?.classList.remove('hidden');
        this.setAttribute('aria-expanded', 'true');
      } else {
        
        menuIcon?.classList.remove('hidden');
        closeIcon?.classList.add('hidden');
        this.setAttribute('aria-expanded', 'false');
      }
    });

    <script>
// ── Contact dropdown ──
(function() {
  document.addEventListener('click', function(e) {
    var link = document.getElementById('contact-link');
    if (link && (e.target === link || link.contains(e.target))) {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    }
  }, true);
  document.addEventListener('mousedown', function(e) {
    var link = document.getElementById('contact-link');
    if (link && (e.target === link || link.contains(e.target))) {
      e.preventDefault(); e.stopPropagation();
    }
  }, true);
})();

document.addEventListener('DOMContentLoaded', function() {
  // ── Hamburger menu ──
  var navToggle = document.getElementById('nav-toggle');
  var navMenu   = document.getElementById('nav-menu');
  var iconOpen  = document.getElementById('nav-icon-open');
  var iconClose = document.getElementById('nav-icon-close');

  if (navToggle && navMenu) {
    navToggle.addEventListener('click', function() {
      var open = navMenu.classList.toggle('nav-open');
      navToggle.setAttribute('aria-expanded', String(open));
      if (iconOpen)  iconOpen.style.display  = open ? 'none' : '';
      if (iconClose) iconClose.style.display = open ? ''     : 'none';
    });
    // Close mobile menu when a nav link (not contact toggle) is clicked
    navMenu.addEventListener('click', function(e) {
      var isMobile = window.innerWidth < 768;
      if (!isMobile) return;
      var target = e.target.closest('a');
      if (target && target.id !== 'contact-link') {
        navMenu.classList.remove('nav-open');
        navToggle.setAttribute('aria-expanded', 'false');
        if (iconOpen)  iconOpen.style.display  = '';
        if (iconClose) iconClose.style.display = 'none';
      }
    });
    // Close on outside click
    document.addEventListener('click', function(e) {
      if (!navMenu.contains(e.target) && !navToggle.contains(e.target)) {
        navMenu.classList.remove('nav-open');
        navToggle.setAttribute('aria-expanded', 'false');
        if (iconOpen)  iconOpen.style.display  = '';
        if (iconClose) iconClose.style.display = 'none';
      }
    });
  }

  // ── Contact dropdown (desktop hover + click; mobile click) ──
  var wrapper = document.getElementById('contact-dropdown-wrapper');
  var link    = document.getElementById('contact-link');
  var menu    = document.getElementById('contact-dropdown');
  if (!wrapper || !link || !menu) return;

  link.setAttribute('href', 'javascript:void(0);');

  var hasHover = window.matchMedia('(hover: hover)').matches;
  var clickedOpen = false, isHovered = false, hideTimer = null;

  function show() {
    clearTimeout(hideTimer);
    wrapper.classList.add('show-dropdown');
    link.setAttribute('aria-expanded', 'true');
  }
  function hide() {
    wrapper.classList.remove('show-dropdown');
    link.setAttribute('aria-expanded', 'false');
  }
  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      if (!clickedOpen && !isHovered) {
        try { if (!wrapper.matches(':hover') && !menu.matches(':hover')) hide(); else isHovered = true; }
        catch(e) { hide(); }
      }
    }, 200);
  }

  if (hasHover) {
    wrapper.addEventListener('mouseenter', function() { isHovered = true; show(); });
    wrapper.addEventListener('mouseleave', function(e) {
      if (!menu.contains(e.relatedTarget)) { isHovered = false; scheduleHide(); }
    });
    menu.addEventListener('mouseenter', function() { isHovered = true; clearTimeout(hideTimer); });
    menu.addEventListener('mouseleave', function(e) {
      if (!wrapper.contains(e.relatedTarget)) { isHovered = false; scheduleHide(); }
    });
  }

  link.addEventListener('click', function(e) {
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    // On mobile, use mob-open class so CSS always-visible rule applies
    if (window.innerWidth < 768) {
      var open = wrapper.classList.toggle('mob-open');
      wrapper.classList.toggle('show-dropdown', open);
      link.setAttribute('aria-expanded', String(open));
    } else {
      clickedOpen = !clickedOpen;
      clickedOpen ? show() : hide();
    }
    return false;
  }, true);

  document.addEventListener('click', function(e) {
    if ((clickedOpen || wrapper.classList.contains('mob-open')) && !wrapper.contains(e.target)) {
      clickedOpen = false;
      wrapper.classList.remove('show-dropdown', 'mob-open');
      link.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      clickedOpen = false;
      wrapper.classList.remove('show-dropdown', 'mob-open');
      link.setAttribute('aria-expanded', 'false');
      link.focus();
    }
  });
});
</script>
