      document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('contact-dropdown-wrapper');
        const link = document.getElementById('contact-link');
        const menu = document.getElementById('contact-dropdown');
        const chevron = document.getElementById('contact-chevron');
        
        if (!wrapper || !link || !menu) return;
        
        // Detect device type
        const hasHover = window.matchMedia('(hover: hover)').matches;
        const isMobile = window.matchMedia('(max-width: 768px)').matches && !hasHover;
        
        function showDropdown() {
          console.log('showDropdown called');
          // Remove all hiding classes
          menu.classList.remove('hidden');
          menu.classList.remove('opacity-0');
          menu.classList.remove('invisible');
          menu.classList.remove('-translate-y-2');
          menu.classList.remove('-translate-y-2');
          menu.classList.remove('pointer-events-none');
          // Add showing classes
          menu.classList.add('opacity-100');
          menu.classList.add('translate-y-0');
          menu.classList.add('pointer-events-auto');
          // Force display (override any inline styles or Tailwind)
          menu.style.setProperty('display', 'block', 'important');
          menu.style.visibility = 'visible';
          menu.style.opacity = '1';
          menu.style.transform = 'translateY(0)';
          menu.style.pointerEvents = 'auto';
          // Update ARIA
          link.setAttribute('aria-expanded', 'true');
          if (chevron) chevron.classList.add('rotate-180');
        }
        
        function hideDropdown() {
          console.log('hideDropdown called');
          // Add hiding classes
          menu.classList.add('opacity-0');
          menu.classList.add('-translate-y-2');
          menu.classList.add('pointer-events-none');
          // Remove showing classes
          menu.classList.remove('opacity-100');
          menu.classList.remove('translate-y-0');
          menu.classList.remove('pointer-events-auto');
          // Force hide after transition
          setTimeout(() => {
            menu.classList.add('hidden');
            menu.style.setProperty('display', 'none', 'important');
            menu.style.visibility = 'hidden';
          }, 200);
          // Update ARIA
          link.setAttribute('aria-expanded', 'false');
          if (chevron) chevron.classList.remove('rotate-180');
        }
        
        // Desktop: Show on hover AND click
        if (!isMobile) {
          // Hover events
          wrapper.addEventListener('mouseenter', showDropdown);
          wrapper.addEventListener('mouseleave', hideDropdown);
          menu.addEventListener('mouseenter', showDropdown);
          menu.addEventListener('mouseleave', hideDropdown);
          
          // Click events (for desktop users who prefer clicking)
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const isExpanded = link.getAttribute('aria-expanded') === 'true';
            if (isExpanded) {
              hideDropdown();
            } else {
              showDropdown();
            }
          });
          
          // Close on outside click
          document.addEventListener('click', (e) => {
            if (!wrapper.contains(e.target)) {
              hideDropdown();
            }
          });
        }
        
        // Mobile: Toggle on tap
        if (isMobile) {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const isExpanded = link.getAttribute('aria-expanded') === 'true';
            if (isExpanded) {

            }
          });
          
          // Close on outside tap
          document.addEventListener('click', (e) => {
            if (!wrapper.contains(e.target)) {
              hideDropdown();
            }
          });
          
          // Close on ESC key
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && link.getAttribute('aria-expanded') === 'true') {
              hideDropdown();
            }
          });
        }

          // Keyboard navigation
          contactLink.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              if (isMobile) {
                e.preventDefault();
                if (isOpen) {
                  hideDropdown();
                } else {
                  showDropdown();
                }
              }
            } else if (e.key === 'ArrowDown' && !isOpen) {
              e.preventDefault();
              showDropdown();
            } else if (e.key === 'Escape' && isOpen) {
              e.preventDefault();
              hideDropdown();
              contactLink.focus();
            }
          });
          
          // Keyboard navigation within dropdown
          const menuItems = contactDropdown.querySelectorAll('[role="menuitem"]');
          menuItems.forEach((item, index) => {
            item.addEventListener('keydown', (e) => {
              if (e.key === 'ArrowDown') {
                e.preventDefault();
                const next = menuItems[index + 1] || menuItems[0];
                next?.focus();
              } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = menuItems[index - 1] || menuItems[menuItems.length - 1];
                prev?.focus();
              } else if (e.key === 'Escape') {
                e.preventDefault();
                hideDropdown();
                contactLink.focus();
              }
            });
          });
          
          // Close on Escape key

// ── Contact dropdown ──
(function() {
  document.addEventListener('click', function(e) {
    var link = document.getElementById('contact-link');
    if (link && (e.target === link || link.contains(e.target))) {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    }
  }, true);
  document.addEventListener('mousedown', function(e) {
    var link = document.getElementById('contact-link');
    if (link && (e.target === link || link.contains(e.target))) {
      e.preventDefault(); e.stopPropagation();
    }
  }, true);
})();
document.addEventListener('DOMContentLoaded', function() {
  var wrapper = document.getElementById('contact-dropdown-wrapper');
  var link    = document.getElementById('contact-link');
  var menu    = document.getElementById('contact-dropdown');
  if (!wrapper || !link || !menu) return;
  link.setAttribute('href', 'javascript:void(0);');
  var hasHover = window.matchMedia('(hover: hover)').matches;
  var clickedOpen = false, isHovered = false, hideTimer = null;
  function show() {
    clearTimeout(hideTimer);
    wrapper.classList.add('show-dropdown');
    link.setAttribute('aria-expanded', 'true');
  }
  function hide() {
    wrapper.classList.remove('show-dropdown');
    link.setAttribute('aria-expanded', 'false');
  }
  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      if (!clickedOpen && !isHovered) {
        try { if (!wrapper.matches(':hover') && !menu.matches(':hover')) hide(); else isHovered = true; }
        catch(e) { hide(); }
      }
    }, 200);
  }
  if (hasHover) {
    wrapper.addEventListener('mouseenter', function() { isHovered = true; show(); });
    wrapper.addEventListener('mouseleave', function(e) {
      if (!menu.contains(e.relatedTarget)) { isHovered = false; scheduleHide(); }
    });
    menu.addEventListener('mouseenter', function() { isHovered = true; clearTimeout(hideTimer); });
    menu.addEventListener('mouseleave', function(e) {
      if (!wrapper.contains(e.relatedTarget)) { isHovered = false; scheduleHide(); }
    });
  }
  link.addEventListener('click', function(e) {
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
    clickedOpen = !clickedOpen;
    clickedOpen ? show() : hide();
    return false;
  }, true);
  document.addEventListener('click', function(e) {
    if (clickedOpen && !wrapper.contains(e.target)) { clickedOpen = false; hide(); }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { clickedOpen = false; hide(); link.focus(); }
  });
});
</script>
